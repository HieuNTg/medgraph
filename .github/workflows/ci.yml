name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ── Python lint ──────────────────────────────────────────────────────────────
  lint:
    name: Lint (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-lint-

      - name: Install ruff
        run: pip install "ruff>=0.4"

      - name: ruff check
        run: ruff check medgraph/ tests/

      - name: ruff format check
        run: ruff format --check medgraph/ tests/

  # ── Backend tests ────────────────────────────────────────────────────────────
  test-backend:
    name: Test Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install package + dev deps
        run: pip install -e ".[dev]"

      - name: Seed database
        run: python -m medgraph.cli seed

      - name: Run pytest with coverage
        run: |
          python -m pytest tests/ -v \
            --tb=short \
            --cov=medgraph \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=54

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-xml-py${{ matrix.python-version }}
          path: coverage.xml

  # ── Frontend build + type check ──────────────────────────────────────────────
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('dashboard/package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-

      - name: Install npm dependencies
        working-directory: dashboard
        run: npm ci

      - name: TypeScript type check
        working-directory: dashboard
        run: npx tsc --noEmit

      - name: Production build
        working-directory: dashboard
        run: npm run build

      - name: Run Vitest unit tests
        working-directory: dashboard
        run: npm test -- --run

  # ── Security scanning ────────────────────────────────────────────────────────
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install security tools
        run: pip install bandit pip-audit
      - name: Run bandit (Python security linter)
        run: bandit -r medgraph/ -l -ii --skip B101
      - name: Check dependencies for vulnerabilities
        run: pip-audit

  # ── Docker build validation ─────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t medgraph:ci-${{ github.sha }} .

      - name: Smoke test — container starts and /health responds
        run: |
          docker run -d --name medgraph-smoke \
            -p 8000:8000 \
            -e MEDGRAPH_DB_PATH=/tmp/smoke.db \
            medgraph:ci-${{ github.sha }}
          # Wait up to 30s for container to be ready (migration + seed + uvicorn startup)
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health | grep -q '"status":"ok"'; then
              echo "Health check passed after ${i}s"
              docker stop medgraph-smoke
              exit 0
            fi
            sleep 1
          done
          echo "Container failed to become healthy within 30s"
          docker logs medgraph-smoke
          docker stop medgraph-smoke
          exit 1
