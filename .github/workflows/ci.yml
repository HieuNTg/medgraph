name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ── Python lint ──────────────────────────────────────────────────────────────
  lint:
    name: Lint (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-lint-

      - name: Install ruff
        run: pip install "ruff>=0.4"

      - name: ruff check
        run: ruff check medgraph/ tests/

      - name: ruff format check
        run: ruff format --check medgraph/ tests/

  # ── Backend tests ────────────────────────────────────────────────────────────
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install package + dev deps
        run: pip install -e ".[dev]"

      - name: Seed database
        run: python -m medgraph.cli seed

      - name: Run pytest with coverage
        run: |
          python -m pytest tests/ -v \
            --tb=short \
            --cov=medgraph \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-xml
          path: coverage.xml

  # ── Frontend build + type check ──────────────────────────────────────────────
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('dashboard/package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-

      - name: Install npm dependencies
        working-directory: dashboard
        run: npm ci

      - name: TypeScript type check
        working-directory: dashboard
        run: npx tsc --noEmit

      - name: Production build
        working-directory: dashboard
        run: npm run build
