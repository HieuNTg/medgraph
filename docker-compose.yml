services:
  medgraph:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      # Persist SQLite database across container restarts
      - medgraph-data:/app/data
    env_file:
      - .env
    environment:
      - MEDGRAPH_HOST=0.0.0.0
      - MEDGRAPH_PORT=8000
      - MEDGRAPH_LOG_FORMAT=json
      # Auth (optional): set MEDGRAPH_API_KEYS in .env
      # Rate limiting: MEDGRAPH_RATE_LIMIT=60 MEDGRAPH_RATE_WINDOW=60
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  medgraph-data:
    driver: local
